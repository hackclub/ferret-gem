name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git diff

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install sqlite-vec
        run: gem install sqlite-vec --platform x86_64-linux --ignore-dependencies

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('lib/ferret/configuration.rb') }}

      - name: Determine CI mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "args=--full" >> "$GITHUB_OUTPUT"
          else
            echo "args=--base origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Run CI
        run: ./run_ci.sh ${{ steps.mode.outputs.args }}
